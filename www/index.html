<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toto</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Toto">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface2: #fafafa;
      --primary: #FF3B3B;
      --primary-light: #fef2f2;
      --text: #18181b;
      --text-muted: #a1a1aa;
      --border: #e4e4e7;
      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-light: #fffbeb;
      --danger: #ef4444;
      --danger-light: #fef2f2;

      --sidebar-w: 230px;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── App header ──────────────────────────── */
    .app-header {
      height: calc(56px + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .hamburger-btn { background:none; border:none; cursor:pointer; padding:8px; color:var(--text); -webkit-tap-highlight-color:transparent; }

    .app-logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #18181b;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #64748b;
      padding: 7px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .header-icon-btn:hover { background: #f1f5f9; color: #1e293b; }
    .header-icon-btn svg { stroke: currentColor; }

    .header-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--border);
      transition: border-color 0.15s;
      display: none;
    }
    .header-avatar:hover { border-color: #FF3B3B; }

    .header-sign-out {
      font-size: 11px;
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      color: #64748b;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .header-sign-out:hover { border-color: #ef4444; color: #ef4444; }

    /* ─── App body (sidebar + main) ───────────── */
    .app-body {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ─── Sidebar ─────────────────────────────── */
    .sidebar {
      display: none;
      flex-direction: row;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 200;
    }
    .sidebar.open { display: flex; }
    .sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:199; }
    .sidebar-backdrop.open { display:block; }
    /* ── Icon column (teal, always visible) ───── */
    .icon-col {
      width: 60px;
      background: #FF3B3B;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .icon-col-top {
      height: 44px;
      flex-shrink: 0;
    }

    .icon-nav { padding: 6px 0; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.22); color: #fff; }
    .nav-item .nav-icon-svg, .nav-group-btn .nav-icon-svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      transition: stroke 0.15s;
      fill: none;
    }

    .icon-col-actions {
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
    }
    .icon-col-actions button {
      background: none; border: none;
      display: flex; align-items: center; justify-content: center;
      height: 36px; cursor: pointer;
      color: rgba(255,255,255,0.55);
      transition: background 0.15s, color 0.15s;
    }
    .icon-col-actions button:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .icon-col-actions button svg { stroke: currentColor; }

    .icon-col-user {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .icon-col-user img {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; background: rgba(255,255,255,0.2);
    }

    /* ── Text column (white, slides in/out) ──── */
    .text-col {
      width: 170px;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.22s ease, box-shadow 0.22s ease;
      white-space: nowrap;
    }

    .sidebar.collapsed .text-col { width: 0; border-right: none; }
    .sidebar.collapsed:hover .text-col {
      width: 170px;
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 16px rgba(0,0,0,0.08);
    }

    .text-col-top {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-toggle {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; padding: 6px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-toggle:hover { background: #f1f5f9; color: #1e293b; }

    .icon-collapse { display: block; }
    .icon-pin      { display: none; }
    .sidebar.collapsed .icon-collapse { display: none; }
    .sidebar.collapsed .icon-pin      { display: block; }

    .text-nav { padding: 6px 8px; flex: 1; }

    .nav-text-item {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #64748b;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .nav-text-item:hover { background: #f1f5f9; color: #1e293b; }
    .nav-text-item.active { background: none; color: #1e293b; font-weight: 600; }

    .text-col-actions {
      padding: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .text-col-actions button {
      background: none; border: none;
      color: #64748b; border-radius: 7px;
      padding: 7px 12px; font-size: 12px;
      cursor: pointer; text-align: left;
      display: flex; align-items: center;
      transition: all 0.15s; white-space: nowrap;
    }
    .text-col-actions button:hover { background: #f1f5f9; color: #1e293b; }

    /* ─── Sidebar user (text col) ─────────────── */
    .sidebar-user {
      display: none; align-items: center; gap: 8px;
      padding: 10px 12px; border-top: 1px solid var(--border);
      color: #64748b; white-space: nowrap; overflow: hidden;
    }
    .sidebar-user-name {
      flex: 1; font-size: 11px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar-user-out {
      font-size: 11px; padding: 3px 8px; background: #f1f5f9;
      border: none; color: #64748b; border-radius: 4px;
      cursor: pointer; flex-shrink: 0; transition: background .15s;
    }
    .sidebar-user-out:hover { background: #fee2e2; color: #ef4444; }

    /* ─── Login overlay ───────────────────────── */
    #login-overlay {
      position: fixed; inset: 0; background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; z-index: 9999;
    }
    #login-overlay.hidden { display: none !important; }
    .google-sign-in-btn {
      display: flex; align-items: center; gap: 12px;
      background: #fff; color: #3c4043; border: none;
      border-radius: 8px; padding: 13px 28px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      transition: box-shadow .15s;
    }
    .google-sign-in-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,.35); }
    .google-sign-in-btn svg { flex-shrink: 0; }

    /* ─── Main ────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .tab-panel { display: none; opacity: 0; }
    .tab-panel.active { display: block; animation: fadeIn 0.2s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .page-header p {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ─── Cards ───────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card-value.green { color: var(--success); }
    .card-value.red { color: var(--danger); }
    .card-value.orange { color: var(--warning); }

    /* ─── Progress bar ────────────────────────── */
    .progress-wrap { margin-top: 10px; }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-fill.green { background: var(--success); }
    .progress-fill.orange { background: var(--warning); }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── Section blocks ──────────────────────── */
    .section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
    }

    .section-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .section-body {
      padding: 16px 20px;
    }

    .section-body + .section-body,
    .section-divider {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 4px;
    }

    /* ─── Table ───────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
    .amount.muted { color: var(--text-muted); font-weight: 400; }

    td.actions { width: 80px; white-space: nowrap; }

    /* ─── Badges ──────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.paid { background: var(--success-light); color: var(--success); }
    .badge.pending { background: var(--warning-light); color: #92400e; }
    .badge.unpaid { background: #f1f5f9; color: var(--text-muted); }
    .badge.overdue { background: var(--danger-light); color: var(--danger); }
    .badge.partial { background: #ede9fe; color: #5b21b6; }

    /* ─── Buttons ─────────────────────────────── */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform:scale(0.97); }

    .btn-primary { background: #FF3B3B; color: #fff; border:none; }
    .btn-primary:hover { background: #E02020; }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 6px 8px; }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger-ghost { background: transparent; color: var(--danger); padding: 6px 8px; }
    .btn-danger-ghost:hover { background: var(--danger-light); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ─── Modal ───────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title { font-size: 16px; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

    /* ─── Form fields ─────────────────────────── */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-input, .form-select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus, .form-select:focus { border-color:#FF3B3B; }

    .form-input:focus, .form-select:focus { border-color: var(--primary); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ─── Empty state ─────────────────────────── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 32px; margin-bottom: 10px; }

    /* ─── Budget specific ─────────────────────── */
    .budget-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 720px) {
      .budget-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .main { padding: 20px 16px; }
      .sidebar { width: 60px; }
    }

    .surplus-banner {
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .surplus-banner.positive { background: var(--success-light); border: 1px solid #a7f3d0; }
    .surplus-banner.negative { background: var(--danger-light); border: 1px solid #fecaca; }

    .surplus-label { font-size: 13px; font-weight: 500; }
    .surplus-amount { font-size: 20px; font-weight: 700; }
    .surplus-banner.positive .surplus-amount { color: var(--success); }
    .surplus-banner.negative .surplus-amount { color: var(--danger); }

    /* ─── Dashboard summary ───────────────────── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 860px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr 1fr; }
    }

    .next-payment {
      background: var(--primary-light);
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 14px;
    }

    .next-payment-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 4px; }
    .next-payment-name { font-size: 14px; font-weight: 600; }
    .next-payment-amount { font-size: 20px; font-weight: 700; color: var(--primary); }

    .contract-total-badge {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    /* ─── Month picker ────────────────────────── */
    .month-picker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .month-picker-label {
      font-size: 15px;
      font-weight: 600;
      min-width: 130px;
      text-align: center;
    }

    .month-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .month-btn:hover { background: var(--bg); color: var(--text); }

    /* ─── Receipts ────────────────────────────── */
    .attach-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .attach-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .attach-btn.has-files { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .receipt-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 8px;
    }

    .receipt-icon { font-size: 22px; flex-shrink: 0; }

    .receipt-info { flex: 1; min-width: 0; }
    .receipt-name { font-weight: 500; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .receipt-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.15s;
      cursor: pointer;
    }

    .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
    .drop-zone-icon { font-size: 28px; margin-bottom: 8px; }

    /* ─── Sortable columns ────────────────────── */
    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th.sortable:hover { color: var(--text); }

    .sort-icon {
      display: inline-block;
      margin-left: 3px;
      opacity: 0.3;
      font-size: 10px;
      font-style: normal;
    }

    th.sort-active { color: var(--primary) !important; }
    th.sort-active .sort-icon { opacity: 1; }

    /* ─── Variance ────────────────────────────── */
    .var-over  { color: var(--danger);  font-weight: 600; }
    .var-under { color: var(--success); font-weight: 600; }
    .var-none  { color: var(--text-muted); }

    .actual-cell { cursor: pointer; }
    .actual-cell:hover { background: var(--primary-light); border-radius: 4px; }

    .actual-input {
      width: 100px;
      padding: 4px 7px;
      border: 1px solid var(--primary);
      border-radius: 5px;
      font-size: 13px;
      outline: none;
    }

    /* ─── Chart ───────────────────────────────── */
    .chart-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
      margin-right: 5px;
    }

    /* ─── Calendar ────────────────────────────── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cal-header-cell {
      background: var(--surface2);
      text-align: center;
      padding: 8px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .cal-cell {
      background: var(--surface);
      min-height: 90px;
      padding: 6px;
      vertical-align: top;
      cursor: default;
    }

    .cal-cell.other-month { background: var(--surface2); }
    .cal-cell.today { background: var(--primary-light); }

    .cal-day-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .cal-cell.today .cal-day-num { color: var(--primary); }

    .cal-event {
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 4px;
      margin-bottom: 2px;
      background: var(--primary-light);
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .cal-event:hover { background: #bfdbfe; }

    .cal-event.income {
      background: var(--success-light);
      color: var(--success);
    }

    .cal-event.income:hover { background: #a7f3d0; }

    .cal-more {
      font-size: 10px;
      color: var(--text-muted);
      padding: 1px 4px;
      cursor: pointer;
    }

    .cal-day-total {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ─── Mini date picker ────────────────────── */
    .date-picker-wrap { position: relative; }

    .date-picker-trigger {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text-muted);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: border-color 0.15s;
    }

    .date-picker-trigger:hover { border-color: var(--primary); }
    .date-picker-trigger.has-value { color: var(--text); }

    .date-picker-popup {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
      padding: 12px;
      width: 256px;
    }

    .date-picker-popup.hidden { display: none; }

    .dp-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .dp-month-label { font-size: 13px; font-weight: 600; }

    .dp-nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 5px;
      line-height: 1;
    }

    .dp-nav-btn:hover { background: var(--bg); color: var(--text); }

    .dp-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .dp-day-hdr {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 3px 0 5px;
      text-transform: uppercase;
    }

    .dp-day {
      text-align: center;
      padding: 6px 2px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .dp-day:hover { background: var(--primary-light); color: var(--primary); }
    .dp-day.dp-other { color: #d1d5db; pointer-events: none; }
    .dp-day.dp-today { font-weight: 700; color: var(--primary); }
    .dp-day.dp-selected { background: var(--primary); color: #fff; font-weight: 600; }
    .dp-day.dp-selected:hover { background: #1d4ed8; }

    .dp-clear {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      text-align: right;
    }

    .dp-clear-btn {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .dp-clear-btn:hover { color: var(--danger); background: var(--danger-light); }

    /* ─── Settings Accordion ─────────────────── */
    .sacc-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
      background: var(--surface);
    }
    .sacc-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
      transition: background 0.15s;
    }
    .sacc-hdr:hover { background: var(--surface2); }
    .sacc-title { font-size: 14px; font-weight: 700; }
    .sacc-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sacc-chev  { color: var(--text-muted); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
    .sacc-body  { border-top: 1px solid var(--border); }

    /* ─── Settings / Color Swatches ──────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.12);
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .color-row span { flex: 1; font-size: 13px; }
    .color-row input[type=color] {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 2px;
      background: none;
    }

    /* ─── Goals ──────────────────────────────── */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .goal-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .goal-card-title { font-weight: 600; font-size: 14px; }
    .goal-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .progress-bar-wrap { background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; margin: 10px 0 6px; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }

    /* ─── Scenarios ───────────────────────────── */
    .scenario-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .scenario-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; cursor: pointer; gap: 12px;
    }
    .scenario-card-header:hover { background: var(--surface2); }
    .scenario-card-body { border-top: 1px solid var(--border); padding: 20px; display: none; }
    .scenario-card-body.open { display: block; }
    .scenario-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
    .compare-col { background: var(--surface2); border-radius: 8px; padding: 14px 16px; }
    .compare-col-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px; }
    .compare-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .compare-row:last-child { border-bottom: none; font-weight: 700; }
    .adj-list { margin-top: 12px; }
    .adj-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .adj-item:last-child { border-bottom: none; }
    .adj-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }

    /* ─── Kids Zone ───────────────────────────── */
    .kids-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; margin-bottom: 28px; }

    .kid-card {
      background: #fff; border: 2px solid var(--border); border-radius: 16px;
      padding: 20px 16px; display: flex; flex-direction: column; align-items: center;
      gap: 6px; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
      position: relative; text-align: center;
    }
    .kid-card:hover { box-shadow: 0 6px 20px rgba(13,148,136,0.12); transform: translateY(-2px); border-color: #FF3B3B; }

    .kid-avatar { font-size: 36px; width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg,#fef2f2,#ccfbf1); display: flex; align-items: center; justify-content: center; }
    .kid-name { font-size: 15px; font-weight: 700; color: #1e293b; }
    .kid-points { font-size: 26px; font-weight: 800; color: #FF3B3B; line-height: 1; }
    .kid-points-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

    .chore-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; background: #fff; margin-bottom: 8px; transition: border-color 0.15s; }
    .chore-item:hover { border-color: #FF3B3B; }
    .chore-item.pending-approval { border-color: #f59e0b; background: #fffbeb; }
    .chore-item.done-today { border-color: #10b981; background: #ecfdf5; }

    .chore-emoji { font-size: 22px; flex-shrink: 0; }
    .chore-name { font-weight: 600; font-size: 14px; }
    .chore-meta { font-size: 12px; color: #64748b; margin-top: 1px; }
    .chore-pts { background: #fef2f2; color: #FF3B3B; border: 1px solid #99f6e4; border-radius: 99px; padding: 3px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

    .prize-card { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: #fff; margin-bottom: 8px; transition: all 0.15s; }
    .prize-card:hover { border-color: #FF3B3B; }
    .prize-card.can-afford { border-color: #10b981; background: #ecfdf5; }
    .prize-card.pending-redemption { border-color: #f59e0b; background: #fffbeb; }
    .prize-icon { font-size: 26px; flex-shrink: 0; }
    .prize-name { font-weight: 600; font-size: 14px; }
    .prize-desc { font-size: 12px; color: #64748b; margin-top: 1px; }
    .prize-cost { font-size: 14px; font-weight: 700; color: #FF3B3B; white-space: nowrap; flex-shrink: 0; }

    .approve-btn { background: #10b981; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .approve-btn:hover { background: #059669; }
    .reject-btn { background: none; color: #ef4444; border: 1px solid #fca5a5; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .reject-btn:hover { background: #fee2e2; }

    /* ─── Net Worth ───────────────────────────── */
    .nw-hero { text-align: center; padding: 36px 20px 28px; }
    .nw-hero-label { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
    .nw-hero-amount { font-size: 52px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .nw-hero-amount.positive { color: #FF3B3B; }
    .nw-hero-amount.negative { color: #ef4444; }
    .nw-hero-change { font-size: 13px; color: #64748b; margin-top: 8px; }
    .nw-hero-change .up { color: #10b981; font-weight: 600; }
    .nw-hero-change .down { color: #ef4444; font-weight: 600; }
    .nw-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media(max-width:640px) { .nw-cols { grid-template-columns: 1fr; } }
    .nw-col-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .nw-col-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .nw-col-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .nw-col-total { font-size: 15px; font-weight: 700; }
    .nw-col-card.assets .nw-col-total { color: #FF3B3B; }
    .nw-col-card.liabilities .nw-col-total { color: #ef4444; }
    .nw-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid #f1f5f9; gap: 12px; transition: background 0.12s; }
    .nw-item:last-child { border-bottom: none; }
    .nw-item:hover { background: #f8fafc; }
    .nw-item-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; }
    .nw-item-cat { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .nw-item-value { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .nw-col-card.assets .nw-item-value { color: #FF3B3B; }
    .nw-col-card.liabilities .nw-item-value { color: #ef4444; }
    .nw-item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; }
    .nw-item:hover .nw-item-actions { opacity: 1; }
    .nw-add-row { display: flex; align-items: center; justify-content: center; padding: 12px; }
    .nw-trend-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .nw-trend-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .nw-trend-chart { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
    .nw-trend-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nw-trend-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
    .nw-trend-bar.pos { background: linear-gradient(to top, #FF3B3B, #5eead4); }
    .nw-trend-bar.neg { background: linear-gradient(to top, #ef4444, #fca5a5); }
    .nw-trend-label { font-size: 10px; color: #94a3b8; text-align: center; white-space: nowrap; }
    .nw-snapshot-btn { background: #FF3B3B; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .nw-snapshot-btn:hover { background: #E02020; }
    .nw-empty { text-align: center; padding: 20px; color: #94a3b8; font-size: 13px; }

    /* ─── Onboarding ─────────────────────────── */
    .ob-header { background: linear-gradient(135deg,#FF3B3B,#E02020); padding: 32px 32px 24px; color: #fff; }
    .ob-step-dots { display: flex; gap: 6px; margin-bottom: 20px; }
    .ob-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.2s; }
    .ob-dot.active { background: #fff; width: 24px; border-radius: 4px; }
    .ob-dot.done { background: rgba(255,255,255,0.6); }
    .ob-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .ob-subtitle { font-size: 14px; opacity: 0.8; }
    .ob-body { padding: 28px 32px; }
    .ob-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; display: block; }
    .ob-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .ob-option { padding: 9px 18px; border: 2px solid var(--border); border-radius: 99px; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.15s; background: #fff; }
    .ob-option:hover { border-color: #FF3B3B; color: #FF3B3B; }
    .ob-option.selected { border-color: #FF3B3B; background: #fef2f2; color: #FF3B3B; }
    .ob-input-row { display: grid; grid-template-columns: 1fr 140px 130px; gap: 10px; margin-bottom: 12px; align-items: end; }
    .ob-input-row-2 { display: grid; grid-template-columns: 1fr 160px; gap: 10px; margin-bottom: 12px; align-items: end; }
    .ob-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .ob-input:focus { border-color: #FF3B3B; }
    .ob-input-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .ob-expense-row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .ob-expense-row:last-child { border-bottom: none; }
    .ob-expense-name { font-size: 13px; font-weight: 600; }
    .ob-expense-cat  { font-size: 11px; color: #94a3b8; }
    .ob-add-link { font-size: 13px; color: #FF3B3B; font-weight: 600; cursor: pointer; background: none; border: none; padding: 0; margin-top: 4px; }
    .ob-footer { display: flex; align-items: center; justify-content: space-between; padding: 0 32px 28px; }
    .ob-back { background: none; border: none; color: #94a3b8; font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; }
    .ob-back:hover { color: #64748b; }
    .ob-next { background: #FF3B3B; color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .ob-next:hover { background: #E02020; }

    /* ─── Dashboard upgrade ───────────────────── */
    .db-hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:700px) { .db-hero-row { grid-template-columns: 1fr; } }
    .db-nw-card { background: linear-gradient(135deg,#FF3B3B 0%,#E02020 100%); border-radius: 16px; padding: 24px; color: #fff; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px; }
    .db-nw-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.75; margin-bottom: 8px; }
    .db-nw-amount { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .db-nw-change { font-size: 13px; opacity: 0.8; margin-top: 8px; }
    .db-nw-change .up { color: #a7f3d0; font-weight: 700; }
    .db-nw-change .dn { color: #fca5a5; font-weight: 700; }
    .db-stats-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .db-stat { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .db-stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
    .db-stat-val.green { color: #10b981; }
    .db-stat-val.red   { color: #ef4444; }
    .db-stat-val.teal  { color: #FF3B3B; }
    .db-stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px; }
    .db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:700px) { .db-grid { grid-template-columns: 1fr; } }
    .db-widget { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
    .db-widget-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .db-widget-title { font-size: 13px; font-weight: 700; }
    .db-widget-link { font-size: 12px; color: #FF3B3B; font-weight: 600; cursor: pointer; background: none; border: none; padding: 0; }
    .db-bill-row { display: flex; align-items: center; gap: 10px; padding: 11px 18px; border-bottom: 1px solid #f8fafc; }
    .db-bill-row:last-child { border-bottom: none; }
    .db-bill-icon { font-size: 18px; width: 30px; text-align: center; flex-shrink: 0; }
    .db-bill-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; }
    .db-bill-amount { font-size: 13px; font-weight: 700; white-space: nowrap; }
    .db-goal-row { padding: 12px 18px; border-bottom: 1px solid #f8fafc; }
    .db-goal-row:last-child { border-bottom: none; }
    .db-goal-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .db-goal-name { font-size: 13px; font-weight: 600; }
    .db-goal-pct  { font-size: 12px; color: #94a3b8; }
    .db-goal-bar  { height: 6px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
    .db-goal-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right,#FF3B3B,#5eead4); }
    .db-budget-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid #f8fafc; }
    .db-budget-row:last-child { border-bottom: none; }
    .db-budget-label { font-size: 13px; font-weight: 500; color: #64748b; }
    .db-budget-val { font-size: 14px; font-weight: 700; }
    .db-build-bar { height: 8px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin: 12px 18px; }
    .db-build-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right,#2563eb,#60a5fa); }
    .db-empty-row { padding: 20px 18px; text-align: center; font-size: 13px; color: #94a3b8; }
    .nw-target-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .nw-target-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .nw-target-title { font-size: 14px; font-weight: 700; }
    .nw-target-goal { font-size: 22px; font-weight: 800; color: #FF3B3B; }
    .nw-target-sub { font-size: 12px; color: #64748b; margin-top: 3px; }
    .nw-progress-track { height: 10px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin: 14px 0 10px; }
    .nw-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right, #FF3B3B, #5eead4); transition: width 0.5s ease; }
    .nw-progress-fill.over { background: linear-gradient(to right, #10b981, #6ee7b7); }
    .nw-target-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
    .nw-target-stat { display: flex; flex-direction: column; gap: 2px; }
    .nw-target-stat-val { font-size: 15px; font-weight: 700; color: var(--text); }
    .nw-target-stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
    .nw-target-empty { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .nw-debt-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .nw-debt-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .nw-debt-headline { font-size: 13px; color: #64748b; }
    .nw-debt-total { font-size: 24px; font-weight: 800; color: #ef4444; }
    .nw-debt-per { font-size: 13px; color: #94a3b8; }
    .nw-debt-row { display: flex; align-items: center; padding: 10px 0; border-top: 1px solid #f1f5f9; gap: 10px; flex-wrap: wrap; }
    .nw-debt-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 120px; }
    .nw-debt-rate { font-size: 12px; color: #94a3b8; background: #f8fafc; border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
    .nw-debt-int { font-size: 13px; font-weight: 700; color: #ef4444; white-space: nowrap; }
    .nw-debt-payoff { font-size: 11px; color: #64748b; white-space: nowrap; }
    .nw-debt-payoff.warn { color: #f59e0b; font-weight: 600; }

    /* ─── Subscriptions ──────────────────────── */
    .sub-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 24px; }
    .sub-stat { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .sub-stat-val { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .sub-stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
    .sub-import-card { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); border-radius: 16px; padding: 24px; margin-bottom: 24px; color: #fff; }
    .sub-import-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .sub-import-desc { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 18px; }
    .sub-import-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .sub-upload-btn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.25); color: #fff; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .sub-upload-btn:hover { background: rgba(255,255,255,0.25); }
    .sub-api-input { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 9px 12px; font-size: 13px; outline: none; flex: 1; min-width: 200px; }
    .sub-api-input::placeholder { color: rgba(255,255,255,0.4); }
    .sub-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub-results-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
    .sub-results-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sub-results-title { font-size: 14px; font-weight: 700; }
    .sub-result-row { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #f8fafc; flex-wrap: wrap; }
    .sub-result-row:last-child { border-bottom: none; }
    .sub-result-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sub-result-info { flex: 1; min-width: 120px; }
    .sub-result-name { font-size: 14px; font-weight: 600; }
    .sub-result-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .sub-result-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
    .sub-result-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .sub-add-btn { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 7px; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
    .sub-add-btn.primary { background: #FF3B3B; color: #fff; }
    .sub-add-btn.primary:hover { background: #E02020; }
    .sub-add-btn.secondary { background: #f1f5f9; color: #475569; }
    .sub-add-btn.secondary:hover { background: #e2e8f0; }
    .sub-add-btn.dismiss { background: none; color: #94a3b8; border: 1px solid #e2e8f0; }
    .sub-add-btn.dismiss:hover { background: #f8fafc; }
    .sub-list { display: flex; flex-direction: column; gap: 8px; }
    .sub-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #fff; border: 1px solid var(--border); border-radius: 10px; transition: box-shadow 0.15s; }
    .sub-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .sub-row-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .sub-row-info { flex: 1; min-width: 0; }
    .sub-row-name { font-size: 14px; font-weight: 600; }
    .sub-row-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .sub-row-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
    .sub-row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; }
    .sub-row:hover .sub-row-actions { opacity: 1; }
    .sub-cat-header { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #94a3b8; margin: 16px 0 6px; }

    /* ─── Bills ───────────────────────────────── */
    .bills-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 24px; }
    .bills-stat { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .bills-stat-val { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .bills-stat-val.danger { color: #ef4444; }
    .bills-stat-val.warn   { color: #f59e0b; }
    .bills-stat-val.ok     { color: #10b981; }
    .bills-stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
    .bills-timeline { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .bills-timeline-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .bills-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .bills-day { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 38px; }
    .bills-day-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #64748b; }
    .bills-day-num.today { background: #FF3B3B; color: #fff; }
    .bills-day-num.has-bill { background: #fef2f2; color: #ef4444; border: 1.5px solid #fca5a5; }
    .bills-day-num.today.has-bill { background: #ef4444; color: #fff; border-color: #ef4444; }
    .bills-day-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
    .bills-day-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; }
    .bills-upcoming { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .bills-upcoming-group { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #94a3b8; margin: 8px 0 4px; }
    .bill-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #fff; border: 1px solid var(--border); border-radius: 10px; transition: box-shadow 0.15s; }
    .bill-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .bill-row.overdue { border-color: #fca5a5; background: #fff5f5; }
    .bill-row.due-soon { border-color: #fde68a; background: #fffbeb; }
    .bill-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #f8fafc; }
    .bill-info { flex: 1; min-width: 0; }
    .bill-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .bill-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .bill-amount { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .bill-due-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
    .bill-due-badge.overdue { background: #fee2e2; color: #ef4444; }
    .bill-due-badge.today   { background: #fef3c7; color: #d97706; }
    .bill-due-badge.soon    { background: #fffbeb; color: #f59e0b; }
    .bill-due-badge.ok      { background: #ecfdf5; color: #10b981; }
    .bill-paid-btn { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #64748b; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .bill-paid-btn:hover { border-color: #10b981; color: #10b981; background: #ecfdf5; }
    .bill-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; }
    .bill-row:hover .bill-actions { opacity: 1; }

    /* ─── Sidebar nav groups ──────────────────── */
    .nav-group-btn {
      display: flex; align-items: center; justify-content: center;
      height: 40px; cursor: pointer;
      color: rgba(255,255,255,0.65); transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .nav-group-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-group-btn.open  { background: rgba(255,255,255,0.18); color: #fff; }
    .nav-group-children { overflow: hidden; transition: max-height 0.22s ease; max-height: 0; }
    .nav-group-children.open { max-height: 240px; }
    .nav-group-children .nav-item { padding-left: 8px; }
    .nav-group-children .nav-item::before {
      content: ''; display: block; width: 2px; height: 20px;
      background: rgba(255,255,255,0.25); border-radius: 2px;
      margin-right: 4px; flex-shrink: 0;
    }
    .text-nav-group-btn {
      display: flex; align-items: center; justify-content: space-between;
      height: 40px; padding: 0 12px; border-radius: 8px; cursor: pointer;
      color: #64748b; font-weight: 600; font-size: 13px;
      transition: background 0.15s, color 0.15s; user-select: none;
    }
    .text-nav-group-btn:hover { background: #f1f5f9; color: #1e293b; }
    .text-nav-group-btn .chevron { transition: transform 0.22s ease; font-size: 10px; }
    .text-nav-group-btn.open .chevron { transform: rotate(90deg); }
    .text-nav-group-children { overflow: hidden; transition: max-height 0.22s ease; max-height: 0; }
    .text-nav-group-children.open { max-height: 200px; }
    .text-nav-group-children .nav-text-item { padding-left: 22px; font-size: 13px; }

    /* Expense row swipe-up hover */
    .expense-row {
      background-size: 100% 200%;
      background-position: 0 100%;
      background-image: linear-gradient(to top, color-mix(in srgb, var(--row-color) 12%, transparent) 0%, transparent 50%);
      transition: background-position .35s ease;
    }
    .expense-row:hover {
      background-position: 0 0;
    }

    /* ─── Planner ────────────────────────────── */
    .planner-header { display:flex; align-items:center; justify-content:space-between; padding:24px 24px 16px; flex-wrap:wrap; gap:12px; }
    .planner-month-nav { display:flex; align-items:center; gap:8px; }
    .planner-month-nav button { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; color:var(--text); font-size:16px; line-height:1; }
    .planner-month-nav h2 { font-size:16px; font-weight:700; min-width:160px; text-align:center; }
    .planner-empty { text-align:center; padding:60px 24px; color:var(--text-muted); }
    .planner-events { padding:0 24px 24px; display:flex; flex-direction:column; gap:14px; }
    .planner-event-card { background:#fff; border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    .planner-event-header { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; }
    .planner-event-header:hover { background:var(--surface2); }
    .planner-event-type-badge { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .planner-event-meta { flex:1; min-width:0; }
    .planner-event-title { font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .planner-event-date { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .planner-event-side { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .planner-event-body { border-top:1px solid var(--border); padding:16px; }
    .planner-notes { font-size:13px; color:var(--text-muted); margin-bottom:14px; line-height:1.5; }
    .planner-estimate-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
    .planner-estimate-row:last-child { border-bottom:none; }
    .planner-estimate-check { width:22px; height:22px; border-radius:6px; border:2px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
    .planner-estimate-check.accepted { background:var(--success); border-color:var(--success); color:#fff; }
    .planner-estimate-name { flex:1; font-size:14px; }
    .planner-estimate-cat { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .planner-estimate-amount { font-weight:700; font-size:14px; }
    .planner-estimate-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
    .planner-total { font-size:13px; color:var(--text-muted); }
    .planner-total strong { color:var(--text); font-weight:700; }
    .planner-pushed-badge { background:var(--success-light); color:var(--success); font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap; }
    .planner-ai-btn { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:10px; padding:8px 16px; cursor:pointer; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }
    .planner-ai-btn:disabled { opacity:.6; cursor:not-allowed; }
    .planner-push-btn { background:var(--success); color:#fff; border:none; border-radius:10px; padding:8px 16px; cursor:pointer; font-size:13px; font-weight:600; }
    .planner-push-btn:disabled { opacity:.4; cursor:not-allowed; }
    .planner-month-total { font-size:12px; font-weight:600; background:var(--primary-light); color:var(--primary); padding:4px 12px; border-radius:20px; }
    .planner-chevron { transition:transform .2s; color:var(--text-muted); }
    .planner-chevron.open { transform:rotate(180deg); }
    .planner-body-actions { display:flex; gap:8px; margin-top:12px; }

    /* Planner calendar grid */
    .planner-cal { padding:0 24px 12px; }
    .planner-cal-header { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:2px; }
    .planner-cal-day-hdr { text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); padding:6px 0; text-transform:uppercase; letter-spacing:.5px; }
    .planner-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .planner-cal-cell { min-height:72px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px; cursor:pointer; transition:background .1s; }
    .planner-cal-cell:hover { background:var(--surface2); }
    .planner-cal-cell.muted { opacity:.35; }
    .planner-cal-cell.today .planner-cal-cell-num { background:var(--primary); color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
    .planner-cal-cell.selected { border-color:var(--primary); background:var(--primary-light); }
    .planner-cal-cell-num { font-size:12px; font-weight:600; margin-bottom:3px; }
    .planner-cal-cell-events { display:flex; flex-direction:column; gap:2px; }
    .planner-chip { font-size:10px; padding:2px 5px; border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; line-height:1.4; }
    .planner-chip-more { font-size:10px; color:var(--text-muted); padding:1px 4px; }
    .planner-day-panel { margin:0 16px 16px; border:2px solid var(--primary); border-radius:14px; overflow:hidden; }
    .planner-day-panel-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--primary-light); border-bottom:1px solid var(--border); }
    .planner-day-title { font-weight:700; font-size:15px; color:var(--primary); }
    .planner-day-events { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }

    /* Weekly strip */
    .ws-strip { display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:4px; }
    .ws-strip::-webkit-scrollbar { display:none; }
    .ws-day { background:#fff; border:1px solid var(--border); border-radius:10px; padding:8px 6px; cursor:pointer; transition:border-color .15s; min-width:0; flex:0 0 calc((100% - 36px) / 7); }
    .ws-day:hover { border-color:var(--primary); }
    .ws-today { border-color:var(--primary); background:var(--primary-light); }
    .ws-day-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; color:var(--text-muted); margin-bottom:1px; }
    .ws-today .ws-day-label { color:var(--primary); }
    .ws-day-date { font-size:12px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .ws-day-events { display:flex; flex-direction:column; gap:2px; min-height:16px; }
    .ws-event-chip { font-size:9px; padding:2px 4px; border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; line-height:1.3; }
    .ws-empty { font-size:10px; color:var(--border); }
    .ws-cost { font-size:10px; font-weight:700; color:var(--success); margin-top:3px; }

    /* ─── Diary layout ───────────────────────── */
    .diary-hero { padding:20px 20px 16px; background:#18181b; color:#fff; border-radius:12px; margin:0 16px 16px; }
    .diary-weekday { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; opacity:.5; margin-bottom:2px; }
    .diary-date-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .diary-day-num { font-size:36px; font-weight:900; line-height:1; letter-spacing:-1px; }
    .diary-month-year { font-size:16px; font-weight:300; opacity:.7; }
    .diary-today-events { margin-top:12px; display:flex; flex-direction:column; gap:4px; }
    .diary-today-ev { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.1); border-radius:8px; padding:6px 10px; font-size:12px; }
    .diary-today-ev-badge { font-size:14px; }
    .diary-nothing { font-size:12px; opacity:.4; font-style:italic; }
    .diary-add-today { margin-top:8px; background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:7px 14px; font-size:12px; cursor:pointer; font-weight:600; }
    .diary-add-today:hover { background:rgba(255,255,255,.2); }

    .diary-section { padding:12px 16px 0; }
    .diary-section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:10px; }

    .diary-tiles { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .diary-tile { background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
    .diary-tile:hover { border-color:var(--primary); }
    .diary-tile-icon { font-size:18px; margin-bottom:6px; }
    .diary-tile-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:3px; }
    .diary-tile-next { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .diary-tile-meta { font-size:10px; color:var(--text-muted); margin-top:2px; }
    .diary-tile-cost { font-size:10px; font-weight:700; color:var(--success); margin-top:2px; }
    .diary-tile-empty { font-size:11px; color:var(--border); font-style:italic; }

    .diary-cal-wrap { padding:12px 16px 20px; }

    /* ─── Toto Assistant ─────────────────────── */
    .toto-btn { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#FF3B3B,#E02020); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:transform .2s, box-shadow .2s; box-shadow:0 2px 8px rgba(13,148,136,.4); }
    .toto-btn:hover { transform:scale(1.1); box-shadow:0 4px 14px rgba(13,148,136,.5); }
    .toto-panel { position:fixed; top:0; right:0; width:380px; height:100vh; background:#fff; border-left:1px solid var(--border); z-index:500; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); box-shadow:-4px 0 24px rgba(0,0,0,.12); }
    .toto-panel.open { transform:translateX(0); }
    .toto-panel-header { padding:18px 18px 14px; background:linear-gradient(135deg,#0f172a,#1e3a5f); color:#fff; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .toto-avatar-wrap { width:44px; height:44px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .toto-panel-name { font-weight:800; font-size:16px; }
    .toto-panel-sub { font-size:11px; opacity:.6; margin-top:1px; }
    .toto-panel-close { margin-left:auto; background:rgba(255,255,255,.15); border:none; color:#fff; width:28px; height:28px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .toto-panel-close:hover { background:rgba(255,255,255,.3); }
    .toto-suggestions { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
    .toto-suggestion { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:8px 12px; font-size:12px; cursor:pointer; text-align:left; color:var(--text); line-height:1.4; transition:background .15s; }
    .toto-suggestion:hover { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }
    .toto-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .toto-msg { display:flex; gap:8px; max-width:100%; }
    .toto-msg.user { flex-direction:row-reverse; }
    .toto-msg-bubble { padding:10px 13px; border-radius:14px; font-size:13px; line-height:1.5; max-width:85%; }
    .toto-msg.toto .toto-msg-bubble { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px 14px 14px 14px; }
    .toto-msg.user .toto-msg-bubble { background:var(--primary); color:#fff; border-radius:14px 4px 14px 14px; }
    .toto-msg-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#FF3B3B,#E02020); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; align-self:flex-end; }
    .toto-input-row { padding:12px 14px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; background:#fff; }
    .toto-input { flex:1; padding:9px 13px; border:1px solid var(--border); border-radius:10px; font-size:13px; outline:none; }
    .toto-input:focus { border-color:var(--primary); }
    .toto-send-btn { background:var(--primary); color:#fff; border:none; border-radius:10px; padding:9px 16px; cursor:pointer; font-size:13px; font-weight:600; }
    .toto-send-btn:disabled { opacity:.5; cursor:not-allowed; }
    .toto-typing { display:flex; gap:4px; align-items:center; padding:4px 0; }
    .toto-typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:toto-bounce .8s infinite; }
    .toto-typing span:nth-child(2) { animation-delay:.15s; }
    .toto-typing span:nth-child(3) { animation-delay:.3s; }
    @keyframes toto-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ─── Budget suggestion inbox ───────────── */
    .suggestion-inbox { background:#fff; border:2px solid #6366f1; border-radius:14px; margin-bottom:20px; overflow:hidden; }
    .suggestion-inbox-header { display:flex; align-items:center; gap:10px; padding:13px 16px; background:linear-gradient(135deg,#eef2ff,#ede9fe); border-bottom:1px solid #c7d2fe; }
    .suggestion-inbox-title { font-size:13px; font-weight:700; color:#3730a3; flex:1; }
    .suggestion-inbox-count { background:#6366f1; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
    .suggestion-row { display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid #e0e7ff; }
    .suggestion-row:last-child { border-bottom:none; }
    .suggestion-event-tag { font-size:11px; color:#6366f1; font-weight:600; background:#eef2ff; padding:2px 7px; border-radius:6px; white-space:nowrap; }
    .suggestion-name { flex:1; font-size:13px; font-weight:600; }
    .suggestion-cat { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .suggestion-amount { font-size:14px; font-weight:700; color:var(--text); margin-right:4px; }
    .suggestion-approve { background:#10b981; color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
    .suggestion-approve:hover { background:#059669; }
    .suggestion-dismiss { background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; }
    .suggestion-dismiss:hover { border-color:#ef4444; color:#ef4444; }

    /* ─── Budget forecast widget ─────────────── */
    .forecast-widget { background:linear-gradient(135deg,#fef2f2,#fef2f2); border:1px solid #6ee7b7; border-radius:14px; margin-bottom:20px; overflow:hidden; }
    .forecast-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #a7f3d0; flex-wrap:wrap; gap:8px; }
    .forecast-header-title { font-size:13px; font-weight:700; color:#991b1b; display:flex; align-items:center; gap:6px; }
    .forecast-push-all { background:#10b981; color:#fff; border:none; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; }
    .forecast-row { display:flex; align-items:center; gap:8px; padding:9px 16px; border-bottom:1px solid #d1fae5; }
    .forecast-row:last-child { border-bottom:none; }
    .forecast-ev-name { font-size:13px; font-weight:600; flex:1; }
    .forecast-ev-date { font-size:11px; color:var(--text-muted); }
    .forecast-ev-cost { font-size:13px; font-weight:700; color:#991b1b; }
    .forecast-pushed { font-size:11px; font-weight:600; color:#10b981; background:#d1fae5; padding:2px 8px; border-radius:20px; white-space:nowrap; }
    .forecast-unpushed { font-size:11px; font-weight:600; color:#64748b; background:#f1f5f9; padding:2px 8px; border-radius:20px; white-space:nowrap; cursor:pointer; }
    .forecast-unpushed:hover { background:#FF3B3B; color:#fff; }
    .forecast-total { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:rgba(16,185,129,.08); border-top:1px solid #a7f3d0; }
    .forecast-total-label { font-size:12px; color:#991b1b; font-weight:600; }

    /* ─── Seasonal nudges ────────────────────── */
    .nudge-section { margin:16px 24px 0; }
    .nudge-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
    .nudge-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px 14px; min-width:200px; max-width:220px; flex-shrink:0; cursor:pointer; transition:border-color .15s; }
    .nudge-card:hover { border-color:var(--primary); }
    .nudge-card-icon { font-size:20px; margin-bottom:6px; }
    .nudge-card-title { font-size:12px; font-weight:700; color:var(--text); }
    .nudge-card-days { font-size:11px; color:var(--primary); font-weight:600; margin-top:2px; }
    .nudge-card-body { font-size:11px; color:var(--text-muted); margin-top:4px; line-height:1.4; }

    /* ─── Recurring badge ────────────────────── */
    .recurring-badge { font-size:10px; background:#e0f2fe; color:#0369a1; padding:2px 7px; border-radius:20px; font-weight:600; white-space:nowrap; }

    /* ─── Spending patterns ──────────────────── */
    .spi-section { margin-bottom:28px; }
    .spi-section-title { font-size:13px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; }
    .spi-breakdown { background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
    .spi-breakdown-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
    .spi-legend { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:4px; vertical-align:middle; }
    .spi-legend-budget { background:#cbd5e1; }
    .spi-legend-actual { background:#2563eb; }
    .spi-cat-row { display:grid; grid-template-columns:130px 1fr 130px; align-items:center; gap:12px; padding:9px 16px; border-bottom:1px solid var(--border); }
    .spi-cat-row:last-child { border-bottom:none; }
    .spi-cat-label { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .spi-cat-bars { display:flex; flex-direction:column; gap:3px; }
    .spi-bar-wrap { position:relative; height:6px; background:#f1f5f9; border-radius:3px; overflow:hidden; }
    .spi-bar-budget { height:100%; background:#cbd5e1; border-radius:3px; transition:width .4s; }
    .spi-bar-actual { position:absolute; top:0; left:0; height:100%; border-radius:3px; transition:width .4s; }
    .spi-bar-actual.over { background:#ef4444; }
    .spi-bar-actual.under { background:#10b981; }
    .spi-bar-actual:not(.over):not(.under) { background:#2563eb; }
    .spi-cat-amounts { display:flex; flex-direction:column; gap:2px; text-align:right; }
    .spi-cat-amounts span { font-size:11px; font-weight:600; }
    .spi-over { color:#ef4444; }
    .spi-under { color:#10b981; }
    .spi-on { color:#2563eb; }
    .spi-no-actual { color:#cbd5e1; font-weight:400; }
    .spi-patterns-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
    .spi-pattern-card { border-radius:12px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
    .spi-pattern-icon { font-size:22px; flex-shrink:0; line-height:1; }
    .spi-pattern-title { font-size:13px; font-weight:700; margin-bottom:3px; }
    .spi-pattern-body { font-size:12px; line-height:1.5; color:var(--text); }
    .spi-sparkline { display:flex; align-items:flex-end; gap:2px; height:20px; margin-top:6px; }
    .spi-spark-bar { width:6px; border-radius:2px 2px 0 0; min-height:2px; }
    .spi-empty-state { text-align:center; padding:32px 20px; color:var(--text-muted); font-size:13px; background:var(--surface2); border-radius:12px; border:1.5px dashed var(--border); }

    /* ─── Meal Plan ───────────────────────────── */
    .meal-grid { display:grid; grid-template-columns:80px repeat(7,1fr); gap:1px; background:var(--border); border-radius:12px; overflow:hidden; }
    .meal-grid-corner { background:var(--surface2); }
    .meal-grid-header { background:var(--surface2); padding:8px 4px; text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); line-height:1.4; }
    .meal-grid-header.today { background:#FF3B3B; color:#fff; }
    .meal-grid-label { background:var(--surface2); padding:8px 10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); display:flex; align-items:center; }
    .meal-cell { background:var(--surface); padding:7px 8px; min-height:54px; cursor:pointer; transition:background 0.1s; display:flex; align-items:flex-start; -webkit-tap-highlight-color:transparent; }
    .meal-cell:hover { background:var(--primary-light); }
    .meal-cell.today { background:#fef2f2; }
    .meal-cell-text { font-size:12px; line-height:1.35; color:var(--text); word-break:break-word; }
    .meal-cell-plus { font-size:18px; color:var(--border); margin:auto; }
    .shop-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
    .shop-row:last-child { border-bottom:none; }

    /* ─── Vehicles ────────────────────────────── */
    .veh-card { border:1px solid var(--border); border-radius:14px; padding:20px; background:var(--surface); margin-bottom:16px; }
    .veh-card-header { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .veh-icon { width:48px; height:48px; border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .veh-name { font-size:16px; font-weight:700; }
    .veh-plate { font-size:12px; font-weight:600; padding:2px 8px; border-radius:6px; background:#fef9c3; color:#854d0e; border:1px solid #fde047; letter-spacing:0.05em; }
    .veh-badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .veh-badge { font-size:12px; font-weight:600; padding:4px 10px; border-radius:99px; display:inline-flex; align-items:center; gap:4px; }
    .veh-badge.green { background:#ecfdf5; color:#065f46; border:1px solid #6ee7b7; }
    .veh-badge.amber { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .veh-badge.red { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }
    .veh-stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin-bottom:16px; }
    .veh-stat { background:var(--surface2); border-radius:10px; padding:12px 14px; }
    .veh-stat-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); margin-bottom:4px; }
    .veh-stat-value { font-size:15px; font-weight:700; }

    /* ─── Document Vault ──────────────────────── */
